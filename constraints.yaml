# constraints.yaml — Machine-readable engineering constraints
# THIS FILE IS THE CANONICAL SOURCE for all regex patterns and numeric thresholds.
# Enforcement scripts read from here at runtime; do not hardcode duplicates.
# Generated by eng-init.

# ── Strictness Profile ─────────────────────────────────────────
strictness_profile:
  schema_version: "3.0.0"
  level: "L4"
  chosen_by_user: true
  downgrades: []

# ── Generated Section Registry ─────────────────────────────────
generated_sections:
  agents_md:
    - title: "Code Canonicality"
      owner: "eng-init"
      template_version: "3.0.0"
    - title: "Project Identity"
      owner: "eng-init"
      template_version: "3.0.0"
    - title: "Stack & Versions"
      owner: "eng-init"
      template_version: "3.0.0"
    - title: "Directory Map"
      owner: "eng-init"
      template_version: "3.0.0"
    - title: "Development Workflow"
      owner: "eng-init"
      template_version: "3.0.0"
    - title: "Verification Matrix"
      owner: "eng-init"
      template_version: "3.0.0"
    - title: "Conventions"
      owner: "eng-init"
      template_version: "3.0.0"
    - title: "Important Development Notes"
      owner: "eng-init"
      template_version: "3.0.0"
    - title: "Critical Paths"
      owner: "eng-init"
      template_version: "3.0.0"
    - title: "Agent Operating Rules"
      owner: "eng-init"
      template_version: "3.0.0"
    - title: "Enforcement Index"
      owner: "eng-init"
      template_version: "3.0.0"
  preserve_unknown_sections: true
  backup_policy: ".eng-init/backups/<UTC>/ only when explicitly requested"

# ── Code Canonicality ──────────────────────────────────────────
code_canonicality:
  forbidden_suffixes:
    description: "Filenames/identifiers matching these patterns are rejected at commit"
    patterns:
      - "_v[0-9]+"
      - "_new"
      - "_old"
      - "_backup"
      - "_temp"
      - "_copy"
      - "_final"
      - "V[0-9]+"
      - "New"
      - "Old"
      - "Legacy"
      - "Deprecated"
      - "Backup"
    enforced_by: ".git-hooks/check-naming.sh"
  scratchpad_directories:
    description: "Directories that must never appear in commits"
    paths: ["tmp", "scratch", "backup", "_old", "deprecated", "archive", "wip"]
    enforced_by: ".git-hooks/check-naming.sh + .gitignore"

# ── Size Limits ────────────────────────────────────────────────
size_limits:
  max_file_lines:
    value: 700
    severity: "block"
    enforced_by: "eslint max-lines rule"
  max_complexity:
    value: 10
    severity: "block"
    enforced_by: "eslint complexity rule"
  max_function_lines:
    value: 200
    severity: "block"
    enforced_by: "eslint max-lines-per-function rule"
  max_pr_diff_lines:
    value: 400
    description: "PRs exceeding this require justification or splitting"
    severity: "block"
    enforced_by: "CI diff-size guard step"

# ── Test Discipline ────────────────────────────────────────────
testing:
  min_line_coverage:
    value: 90
    severity: "block"
    enforced_by: "CI coverage gate (c8)"
  tdd_mode:
    value: "required"
    description: "Every new production file must have a paired test file"
  forbid_mock_of_system_under_test:
    value: true
    description: "Mock dependencies, never the system under test"

# ── Dependency Rules ───────────────────────────────────────────
dependencies:
  min_release_age_days:
    value: 3
    enforced_by: "Renovate config"
  no_circular_dependencies:
    value: true
    enforced_by: "eslint import/no-cycle"
  new_dependency_requires_justification:
    value: true
    description: "PR description must explain why existing tools can't do the job"
  allowed_licenses:
    value: ["MIT", "Apache-2.0", "BSD-3-Clause", "ISC"]
    enforced_by: "CI license audit"

# ── Anti-Drift ─────────────────────────────────────────────────
anti_drift:
  duplicate_code_threshold_percent:
    value: 2
    severity: "block"
    enforced_by: "jscpd"
  dead_code_min_confidence:
    value: 80
    severity: "block"
    enforced_by: "knip"

# ── Module Boundaries ──────────────────────────────────────────
module_boundaries:
  layers: ["domain", "application", "infrastructure"]
  allowed_dependency_directions:
    - "domain -> (none)"
    - "application -> domain"
    - "infrastructure -> domain"
    - "infrastructure -> application"
  forbidden_import_patterns:
    - "domain -> application"
    - "domain -> infrastructure"
    - "application -> infrastructure"
  enforced_by: "eslint import/no-restricted-paths (eslint.config.mjs)"

# ── Commit Discipline ──────────────────────────────────────────
commits:
  conventional_commits_required:
    value: true
    allowed_types: ["feat", "fix", "refactor", "chore", "docs", "test", "ci", "build", "perf"]
    enforced_by: "commitlint"
    agent_co_author_required: true

# ── CI Pipeline ────────────────────────────────────────────────
ci:
  risk_layers: 6
  fast_checks_timeout_minutes: 5
  matrix:
    node: ["20", "22"]

# ── Runtime Verification ───────────────────────────────────────
verification:
  surfaces:
    cli:
      command: "just build && node sdk/examples/create-knowledge-base.mjs"
      evidence: "exit-code+stdout"
      required_at: "L2+"

# ── Exemptions ─────────────────────────────────────────────────
exemptions:
  entries: []

# ── Violation Baseline ─────────────────────────────────────────
baseline:
  mode: "fix-now"
  rev: ""
  counts:
    duplicate_code: 0
    dead_code: 0
    size_violations: 0
    coverage_gap: 0
  enforced_by: "CI baseline-comparison step"

# ── Rehabilitation State ───────────────────────────────────────
rehabilitation:
  active: false
  phase: "none"
  baseline_frozen: false
  command_entrypoint: "just check"
  runtime_verifier: "just test"
  broad_refactor_allowed: true
  work_unit_protocol: "none"
  readiness_gaps: []
  enforced_by: "AGENTS.md Rehabilitation gate + Verification Matrix + constraints.yaml baseline"

# ── Refactor Contract ──────────────────────────────────────────
refactor_contract:
  active: false
