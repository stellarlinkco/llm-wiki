services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: llm_wiki
      POSTGRES_PASSWORD: llm_wiki_test
      POSTGRES_DB: llm_wiki_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm_wiki -d llm_wiki_test"]
      interval: 2s
      timeout: 3s
      retries: 10
